<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MercaBlue — Dashboard Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="images/icono_navegador.ico" />
</head>

<body class="bg-gray-950 text-gray-200 min-h-screen font-sans text-sm">

  <!-- TOPBAR -->
  <div class="bg-gray-900 border-b border-gray-800 px-7 py-3 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-3">
      <img src="images/logo.svg" alt="Logo MercaBlue" class="h-10 w-auto">
      <span class="text-gray-400 text-sm font-medium">Panel de Admin</span>
    </a>
    <a href="index.html"
      class="flex items-center gap-2 text-xs text-gray-400 hover:text-blue-400 bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-2 rounded-lg transition">
      ← Volver al inicio
    </a>
  </div>

  <div class="max-w-7xl mx-auto px-7 py-7 space-y-6">

    <!-- VENTAS -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-gray-300 font-semibold text-sm mb-4 pb-3 border-b border-gray-800">
        📋 Ventas registradas
      </h2>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">#</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Cliente</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Producto</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Categoría</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Cant.</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Precio unit.</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Subtotal</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Total</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Estado</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Fecha</th>
            </tr>
          </thead>
          <tbody id="tbody-ventas">
            <tr>
              <td colspan="10" class="text-gray-500 px-2 py-5">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- USUARIOS -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
      <h2 class="text-gray-300 font-semibold text-sm mb-4 pb-3 border-b border-gray-800">
        👥 Usuarios registrados
      </h2>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">ID</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Nombre</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Email</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Teléfono</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Rol</th>
              <th class="text-left text-xs text-gray-500 uppercase tracking-wider pb-3 px-2">Estado</th>
            </tr>
          </thead>
          <tbody id="tbody-usuarios">
            <tr>
              <td colspan="6" class="text-gray-500 px-2 py-5">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    function pillEstado(estado) {
      const clases = {
        'completada': 'bg-green-900 text-green-400 border border-green-800',
        'pendiente': 'bg-yellow-900 text-yellow-400 border border-yellow-800',
        'cancelada': 'bg-red-900 text-red-400 border border-red-800',
      };
      return `<span class="inline-block px-2 py-0.5 rounded-full text-xs ${clases[estado] || 'bg-blue-900 text-blue-400 border border-blue-800'}">${estado}</span>`;
    }

    // ── VENTAS ──────────────────────────────────────────────────────────────
    fetch('php/consultar_ventas.php')
      .then(r => r.text())
      .then(texto => {
        const tbody = document.getElementById('tbody-ventas');
        const lineas = texto.trim().split('<br>').filter(l => l.trim());

        if (!lineas.length || texto.includes('No hay')) {
          tbody.innerHTML = '<tr><td colspan="10" class="text-gray-500 px-2 py-5">No hay ventas registradas.</td></tr>';
          return;
        }

        tbody.innerHTML = lineas.map(linea => {
          const get = (clave) => {
            const match = linea.match(new RegExp(clave + '[:#]?\\s*([^|]+)'));
            return match ? match[1].trim() : '—';
          };

          const id = linea.match(/Venta #(\d+)/)?.[1] || '—';
          const cliente = get('Cliente');
          const prod = get('Producto');
          const cat = get('Categoría');
          const cant = get('Cantidad');
          const precio = get('Precio');
          const sub = get('Subtotal');
          const total = get('Total');
          const estado = get('Estado').toLowerCase().trim();
          const fecha = get('Fecha').slice(0, 10);

          return `<tr class="border-t border-gray-800 hover:bg-gray-800/40 transition">
            <td class="px-2 py-2.5 text-gray-500">#${id}</td>
            <td class="px-2 py-2.5">${cliente}</td>
            <td class="px-2 py-2.5">${prod}</td>
            <td class="px-2 py-2.5 text-gray-500">${cat}</td>
            <td class="px-2 py-2.5 text-gray-500">${cant}</td>
            <td class="px-2 py-2.5 text-gray-500">${precio}</td>
            <td class="px-2 py-2.5 text-blue-400">${sub}</td>
            <td class="px-2 py-2.5 text-green-400 font-semibold">${total}</td>
            <td class="px-2 py-2.5">${pillEstado(estado)}</td>
            <td class="px-2 py-2.5 text-gray-500">${fecha}</td>
          </tr>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('tbody-ventas').innerHTML =
          '<tr><td colspan="10" class="text-gray-500 px-2 py-5">Error al cargar. Abre desde Laragon.</td></tr>';
      });

    // ── USUARIOS ────────────────────────────────────────────────────────────
    fetch('php/consultar_usuarios.php')
      .then(r => r.text())
      .then(texto => {
        const tbody = document.getElementById('tbody-usuarios');
        const lineas = texto.trim().split('<br>').filter(l => l.trim());

        if (!lineas.length || texto.includes('No se encontraron')) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-gray-500 px-2 py-5">No hay usuarios.</td></tr>';
          return;
        }

        tbody.innerHTML = lineas.map(linea => {
          const get = (clave) => {
            const match = linea.match(new RegExp(clave + ':\\s*([^-]+)'));
            return match ? match[1].trim() : '—';
          };

          const id = get('ID');
          const nombre = get('Nombre');
          const email = get('Email');
          const rol = get('Rol');
          const estado = get('Estado');
          const tel = get('Teléfono');

          const pillRol = rol === 'admin'
            ? 'bg-blue-900 text-blue-400 border border-blue-800'
            : 'bg-yellow-900 text-yellow-400 border border-yellow-800';

          const pillActivo = estado === 'Activo'
            ? 'bg-green-900 text-green-400 border border-green-800'
            : 'bg-red-900 text-red-400 border border-red-800';

          return `<tr class="border-t border-gray-800 hover:bg-gray-800/40 transition">
            <td class="px-2 py-2.5 text-gray-500">${id}</td>
            <td class="px-2 py-2.5">${nombre}</td>
            <td class="px-2 py-2.5 text-gray-500">${email}</td>
            <td class="px-2 py-2.5 text-gray-500">${tel}</td>
            <td class="px-2 py-2.5"><span class="inline-block px-2 py-0.5 rounded-full text-xs ${pillRol}">${rol}</span></td>
            <td class="px-2 py-2.5"><span class="inline-block px-2 py-0.5 rounded-full text-xs ${pillActivo}">${estado}</span></td>
          </tr>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('tbody-usuarios').innerHTML =
          '<tr><td colspan="6" class="text-gray-500 px-2 py-5">Error al cargar. Abre desde Laragon.</td></tr>';
      });
  </script>

</body>

</html>
